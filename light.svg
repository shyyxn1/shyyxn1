<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient Light -->
    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Royal Indigo Gradient -->
    <linearGradient id="indigo-cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Wave Gradient Light -->
    <linearGradient id="wave-grad-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#0891b2" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#c026d3" stop-opacity="0.6" />
    </linearGradient>

    <!-- Soft Shadow Filter -->
    <filter id="shadow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.15" />
    </filter>

    <!-- Text Typewriter ClipPath Light -->
    <clipPath id="type-clip-light">
      <rect x="230" y="70" width="0" height="40">
        <animate attributeName="width" values="0; 570; 570; 0" dur="8s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Main Background Container -->
  <rect width="850" height="320" rx="16" fill="url(#bg-grad-light)" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow-light)" />

  <!-- Grid Lines with SMIL Opacity Animation -->
  <g stroke="#94a3b8" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="40" x2="850" y2="40" />
    <line x1="0" y1="80" x2="850" y2="80" />
    <line x1="0" y1="120" x2="850" y2="120" />
    <line x1="0" y1="160" x2="850" y2="160" />
    <line x1="0" y1="200" x2="850" y2="200" />
    <line x1="0" y1="240" x2="850" y2="240" />
    <line x1="0" y1="280" x2="850" y2="280" />

    <line x1="100" y1="0" x2="100" y2="320" />
    <line x1="200" y1="0" x2="200" y2="320" />
    <line x1="300" y1="0" x2="300" y2="320" />
    <line x1="400" y1="0" x2="400" y2="320" />
    <line x1="500" y1="0" x2="500" y2="320" />
    <line x1="600" y1="0" x2="600" y2="320" />
    <line x1="700" y1="0" x2="700" y2="320" />
    <line x1="800" y1="0" x2="800" y2="320" />

    <animate attributeName="opacity" values="0.1; 0.25; 0.1" dur="4s" repeatCount="indefinite" />
  </g>

  <!-- Terminal Top Header Bar Light -->
  <rect x="0" y="0" width="850" height="36" rx="16" fill="#f1f5f9" />
  <rect x="0" y="20" width="850" height="16" fill="#f1f5f9" />
  <line x1="0" y1="36" x2="850" y2="36" stroke="#e2e8f0" stroke-width="1" />

  <!-- Terminal Window Buttons -->
  <circle cx="20" cy="18" r="6" fill="#ef4444" />
  <circle cx="38" cy="18" r="6" fill="#f59e0b" />
  <circle cx="56" cy="18" r="6" fill="#10b981" />

  <text x="76" y="22" font-family="'Fira Code', monospace" font-size="12" fill="#64748b">shyyx@caixa-seguranca: ~/shyyunzfire (zsh)</text>

  <!-- Status LED Badge Right Top -->
  <g transform="translate(670, 10)">
    <rect x="0" y="0" width="160" height="16" rx="8" fill="rgba(16, 185, 129, 0.1)" stroke="#059669" stroke-width="1" />
    <circle cx="12" cy="8" r="4" fill="#059669">
      <animate attributeName="opacity" values="1; 0.2; 1" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <text x="24" y="12" font-family="'Fira Code', monospace" font-size="10" font-weight="bold" fill="#047857">SISTEMA ONLINE</text>
  </g>

  <!-- Left Side Rotating Hexagon Logo (SMIL Animation) -->
  <g transform="translate(110, 160)">
    <!-- Outer Hexagon Rotate SMIL -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="url(#indigo-cyan-grad)" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
    </polygon>

    <!-- Inner Hexagon Rotate Reverse SMIL -->
    <polygon points="0,-42 36,-21 36,21 0,42 -36,21 -36,-21" fill="none" stroke="#c026d3" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite" />
    </polygon>

    <!-- Center Shield Icon -->
    <path d="M-12,-16 L0,-24 L12,-16 L12,4 C12,14 0,22 0,22 C0,22 -12,14 -12,4 Z" fill="#4f46e5" opacity="0.9">
      <animate attributeName="opacity" values="0.7; 1; 0.7" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Right Side Main Content -->
  <!-- Title -->
  <text x="230" y="95" font-family="'Orbitron', 'Fira Code', sans-serif" font-size="32" font-weight="900" fill="#0f172a">SHYYX</text>
  <text x="365" y="95" font-family="'Orbitron', 'Fira Code', sans-serif" font-size="32" font-weight="900" fill="url(#indigo-cyan-grad)">// DEVSEC</text>

  <!-- Subtitle Typewriter Effect SMIL (PT-BR) -->
  <g clip-path="url(#type-clip-light)">
    <text x="230" y="125" font-family="'Fira Code', monospace" font-size="15" fill="#4f46e5" font-weight="bold">> Engenheiro de Segurança DevSec &amp; Sistemas Web</text>
  </g>

  <!-- Bullet Feature 1 -->
  <g transform="translate(230, 160)">
    <rect x="0" y="-12" width="6" height="6" fill="#c026d3" />
    <text x="16" y="-6" font-family="'Fira Code', monospace" font-size="13" fill="#1e293b">
      <tspan fill="#c026d3" font-weight="bold">ShyyunzFire CLI:</tspan> Auditoria JWT &amp; Exporte DB sem Estouro de RAM
    </text>
  </g>

  <!-- Bullet Feature 2 -->
  <g transform="translate(230, 190)">
    <rect x="0" y="-12" width="6" height="6" fill="#0891b2" />
    <text x="16" y="-6" font-family="'Fira Code', monospace" font-size="13" fill="#1e293b">
      <tspan fill="#0891b2" font-weight="bold">Re-Engenharia Web:</tspan> Arquitetura SSG &amp; Higienização de Pixels
    </text>
  </g>

  <!-- Bullet Feature 3 -->
  <g transform="translate(230, 220)">
    <rect x="0" y="-12" width="6" height="6" fill="#059669" />
    <text x="16" y="-6" font-family="'Fira Code', monospace" font-size="13" fill="#1e293b">
      <tspan fill="#059669" font-weight="bold">Client Shield:</tspan> Geobloqueio IP, Mitigação CORS &amp; Anti-DevTools
    </text>
  </g>

  <!-- Bottom Animated SMIL Sine Wave Path Light -->
  <path d="M 0 290 Q 212.5 270 425 290 T 850 290 L 850 320 L 0 320 Z" fill="url(#wave-grad-light)" opacity="0.7">
    <animate attributeName="d" values="
      M 0 290 Q 212.5 270 425 290 T 850 290 L 850 320 L 0 320 Z;
      M 0 280 Q 212.5 305 425 280 T 850 280 L 850 320 L 0 320 Z;
      M 0 290 Q 212.5 270 425 290 T 850 290 L 850 320 L 0 320 Z
    " dur="5s" repeatCount="indefinite" />
  </path>
</svg>
